<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neue Seite - Idioskosmos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      line-height: 1.6;
    }
    .timestamp {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 30px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }
    .content {
      margin-top: 20px;
    }
    a {
      margin-top: 30px;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="timestamp">
    <strong>Zuletzt aktualisiert:</strong> <span id="lastModified"></span>
  </div>

  <div class="content">
    <h1>Eine Liebesgeschichte</h1>
    <p>Hier können Sie Text hinzufügen...</p>
  </div>

  <a href="index.html">← Zurück zur Startseite</a>

  <script>
    // Zeigt das Änderungsdatum der Seite an
    document.getElementById('lastModified').textContent = new Date(document.lastModified).toLocaleString('de-DE');
  </script>
</body>
</html>
