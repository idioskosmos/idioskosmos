<h1>Die Ungeeignetheit des Wortes <em>Ausbrechen</em></h1>
  <p>
    "ausbrechen" meint hier wohl eher "aufbrechen". Und "aufbrechen" meint "betonen" oder "besinnnen". Denn ausbrechen könnte missverstanden werden als "sich-davon-wegbewegen" und genau das wollen wir nicht. Das wäre undialektisch und damit unpsychologisch.
  </p>
